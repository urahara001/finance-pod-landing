services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: finance_pocketbase
    command: serve --http=0.0.0.0:8090
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb_data
    restart: unless-stopped
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8090/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: finance_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-activepieces}
      POSTGRES_USER: ${POSTGRES_USER:-activepieces}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-activepieces}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finance_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

 
    image: activepieces/activepieces:latest
    container_name: finance_activepieces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AP_POSTGRES_DATABASE: ${POSTGRES_DB:-activepieces}
      AP_POSTGRES_HOST: postgres
      AP_POSTGRES_PORT: 5432
      AP_POSTGRES_USERNAME: ${POSTGRES_USER:-activepieces}
      AP_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AP_POSTGRES_USE_SSL: "false"
      AP_REDIS_HOST: redis
      AP_REDIS_PORT: 6379
      AP_FRONTEND_URL: ${AP_FRONTEND_URL:-http://localhost:8000}
      AP_WEBHOOK_TIMEOUT_SECONDS: 30
      AP_TRIGGER_DEFAULT_POLL_INTERVAL: 5
      AP_ENCRYPTION_KEY: ${AP_ENCRYPTION_KEY}
      AP_JWT_SECRET: ${AP_JWT_SECRET}
      AP_ENVIRONMENT: ${AP_ENVIRONMENT:-prod}
    ports:
      - "8000:80"
    volumes:
      - ./activepieces_data:/root/.activepieces
    restart: unless-stopped
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:80/api/v1/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  listmonk:
    image: listmonk/listmonk:latest
    container_name: finance_listmonk
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LISTMONK_app__address: "0.0.0.0:9000"
      LISTMONK_db__host: postgres
      LISTMONK_db__port: 5432
      LISTMONK_db__user: ${POSTGRES_USER:-activepieces}
      LISTMONK_db__password: ${POSTGRES_PASSWORD}
      LISTMONK_db__database: ${LISTMONK_DB:-listmonk}
      LISTMONK_db__ssl_mode: disable
    ports:
      - "9000:9000"
    volumes:
      - ./listmonk_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s